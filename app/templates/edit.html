<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Measurement</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        form { display: flex; flex-direction: column; max-width: 400px; margin: auto; }
        label { margin-top: 15px; font-weight: bold; }
        input { padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; margin-top: 5px; width: 100%; box-sizing: border-box; }
        button { margin-top: 25px; padding: 15px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 18px; cursor: pointer; }
        a { display: block; text-align: center; margin-top: 20px; color: #666; }
    </style>
</head>
<body>
    <h1>Edit Measurement</h1>
    <form method="POST">
        <label>Weight:</label>
        <input type="number" name="weight" value="{{ record.peso }}" step="0.1" required>

        <label>Fat:</label>
        <input type="number" name="fat" value="{{ record.gordura }}" step="0.1" required>

        <label>Visceral:</label>
        <input type="number" name="viceral" value="{{ record.viceral }}" step="0.1" required>

        <label>Muscle:</label>
        <input type="number" name="muscle" value="{{ record.musculo }}" step="0.1">

        <label>Age:</label>
        <input type="number" name="age" value="{{ record.idade }}">

        <label>Basal:</label>
        <input type="number" name="basal" value="{{ record.basal }}" step="0.1">

        <button type="submit">Save Changes</button>
    </form>
    <a href="/api/dashboard/view">Back to Dashboard</a>
</body>
</html>
