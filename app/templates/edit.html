<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Measurement</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background-color: #f4f4f9; }
        h1 { text-align: center; color: #333; }
        form { display: flex; flex-direction: column; max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        label { margin-top: 15px; font-weight: 600; color: #555; }
        input { padding: 15px; font-size: 16px; border: 1px solid #ddd; border-radius: 6px; margin-top: 8px; width: 100%; box-sizing: border-box; }
        button { margin-top: 25px; padding: 15px; background-color: #28a745; color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; transition: background 0.3s; }
        button:active { background-color: #218838; }
        a { display: block; text-align: center; margin-top: 20px; color: #007bff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Edit Measurement</h1>
    <form method="POST">
        <label>Weight:</label>
        <input type="number" name="weight" value="{{ record.peso }}" step="0.1" required>

        <label>Fat:</label>
        <input type="number" name="fat" value="{{ record.gordura }}" step="0.1" required>

        <label>Visceral:</label>
        <input type="number" name="viceral" value="{{ record.viceral }}" step="0.1" required>

        <label>Muscle:</label>
        <input type="number" name="muscle" value="{{ record.musculo }}" step="0.1">

        <label>Age:</label>
        <input type="number" name="age" value="{{ record.idade }}">

        <label>Basal:</label>
        <input type="number" name="basal" value="{{ record.basal }}" step="0.1">

        <button type="submit">Save Changes</button>
    </form>
    <a href="/api/dashboard/view">Back to Dashboard</a>
</body>
</html>
