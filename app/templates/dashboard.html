<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUFit Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 15px; background-color: #f9f9f9; color: #333; }
        h1 { text-align: center; }
        section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin: 0 auto 20px auto; max-width: 500px; }
        form { display: grid; grid-template-columns: 1fr; gap: 10px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; width: 100%; box-sizing: border-box; }
        button { padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .inspect-btn { display: block; text-align: center; background-color: #008CBA; color: white; padding: 12px; text-decoration: none; border-radius: 4px; margin-top: 15px; font-weight: bold; }
        .chart-container { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin: 0 auto; max-width: 800px; }
        canvas { width: 100% !important; height: auto !important; }
    </style>
</head>
<body>
    <h1>Dashboard - History</h1>

    <section>
        <h3>Add New Measurement</h3>
        <form action="/api/dashboard/add" method="POST">
            <input type="number" step="0.01" name="weight" placeholder="Weight" required>
            <input type="number" step="0.01" name="fat" placeholder="Fat %" required>
            <input type="number" step="0.01" name="visceral" placeholder="Visceral" required>
            <input type="number" step="0.01" name="muscle" placeholder="Muscle">
            <input type="number" step="0.01" name="age" placeholder="Age">
            <input type="number" step="0.01" name="basal" placeholder="Basal Metabolic Rate">
            <button type="submit">Save Measurement</button>
        </form>
        <a href="/api/dashboard/inspect" class="inspect-btn">Inspecionar Valores</a>
    </section>

    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>

    <script>
        fetch('/api/dashboard/history')
            .then(response => response.json())
            .then(data => {
                const ctx = document.getElementById('myChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.map(item => item.date),
                        datasets: [{
                            label: 'Weight History',
                            data: data.map(item => item.weight),
                            borderColor: 'rgb(75, 192, 192)',
                            tension: 0.1
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: true }
                });
            });
    </script>
</body>
</html>
