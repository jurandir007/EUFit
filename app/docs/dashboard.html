<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EUFit Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 10px; background-color: #f1f5f9; color: #333; margin: 0; display: flex; flex-direction: column; height: 100vh; }

        /* User profile container: aligns name and logout button at the top right */
        .user-profile { position: absolute; top: 10px; right: 15px; display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; color: #0f172a; background: #e2e8f0; padding: 5px 12px; border-radius: 20px; }
        /* Logout button: small, red text for visual differentiation */
        .btn-logout { color: #dc2626; text-decoration: none; font-size: 12px; cursor: pointer; }


        /* User profile label fixed at the top right */
        .user-profile {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 14px;
            font-weight: 600;
            color: #0f172a;
            background: #e2e8f0;
            padding: 5px 10px;
            border-radius: 20px;
        }


        /* Formulário no Topo (Ocupa cerca de 40%) */
        section { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        h3 { margin: 0 0 10px 0; font-size: 16px; color: #0077b6; }
        form { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; width: 100%; box-sizing: border-box; }
        button { grid-column: span 2; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* Gráfico na Parte Inferior (Ocupa o restante) */
        .chart-container { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex-grow: 1; min-height: 200px; }
        canvas { width: 100% !important; height: 100% !important; }

        .inspect-btn { display: block; text-align: center; background-color: #008CBA; color: white; padding: 8px; text-decoration: none; border-radius: 6px; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <!-- User profile display: shows current user name and provides a logout link -->
    <div class="user-profile">
        <!-- Exibição do Nome -->
        {% if session.get('user') %}
            Olá, {{ session['user']['name'] }}
        {% else %}
            Olá, visitante
        {% endif %}

        <!-- Exibição do Botão -->
        {% if session.get('user') %}
            <a href="/auth/logout" class="btn-logout">Logout</a>
        {% else %}
            <a href="/auth/login" class="btn-login">Login</a>
        {% endif %}
    </div>
    <section>
        <h3>New Measurement</h3>
        <form action="/api/dashboard/add" method="POST">
            <input type="number" step="0.01" name="weight" placeholder="Weight" required>
            <input type="number" step="0.01" name="fat" placeholder="Fat %" required>
            <input type="number" step="0.01" name="visceral" placeholder="Visc." required>
            <input type="number" step="0.01" name="muscle" placeholder="Muscle">
            <input type="number" step="0.01" name="age" placeholder="Age">
            <input type="number" step="0.01" name="basal" placeholder="BMR">
            <button type="submit">Save</button>
        </form>
        <a href="/api/dashboard/inspect" class="inspect-btn">History Table</a>
    </section>

    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>

    <script>
        fetch('/api/dashboard/history')
            .then(response => response.json())
            .then(data => {
                const ctx = document.getElementById('myChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.map(item => item.date),
                        datasets: [{
                            label: 'Weight',
                            data: data.map(item => item.weight),
                            borderColor: '#0077b6',
                            tension: 0.1
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            });
    </script>
</body>
</html>
