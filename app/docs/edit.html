<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Measurement</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            background-color: #f4f4f9;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        form {
            display: flex;
            flex-direction: column;
            max-width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        label {
            margin-top: 15px;
            font-weight: 600;
            color: #555;
        }
        input {
            padding: 15px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-top: 8px;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            margin-top: 25px;
            padding: 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:active {
            background-color: #218838;
        }
        a {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #6c757d;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Edit Measurement</h1>

    <form method="POST">
        <!-- Timestamp field unlocked and formatted for editing -->
        <label for="carimbo">Timestamp</label>
        <input type="datetime-local" id="carimbo" name="carimbo" value="{{ record.carimbo.strftime('%Y-%m-%dT%H:%M') if record.carimbo else '' }}" required>

        <label for="peso">Weight (kg)</label>
        <input type="number" step="0.01" id="peso" name="peso" value="{{ record.peso }}" required>

        <label for="gordura">Body Fat (%)</label>
        <input type="number" step="0.01" id="gordura" name="gordura" value="{{ record.gordura }}">

        <label for="musculo">Muscle Mass (%)</label>
        <input type="number" step="0.01" id="musculo" name="musculo" value="{{ record.musculo }}">

        <label for="basal">Basal Metabolic Rate</label>
        <input type="number" step="0.01" id="basal" name="basal" value="{{ record.basal }}">

        <label for="idade">Metabolic Age</label>
        <input type="number" step="0.01" id="idade" name="idade" value="{{ record.idade }}">

        <label for="viceral">Visceral Fat</label>
        <input type="number" step="0.01" id="viceral" name="viceral" value="{{ record.viceral }}">

        <button type="submit">Save Changes</button>
        <a href="/">Cancel</a>
    </form>
</body>
</html>
